<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes KanbanWebUI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/design-tokens.css?v=20260522-zh-tw" />
  <link rel="stylesheet" href="/static/style.css?v=20260522-zh-tw" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">H</div>
        <div>
          <h1>Hermes Kanban</h1>
          <p data-i18n="subtitle">清楚好讀的任務營運看板</p>
        </div>
      </div>
      <div class="top-actions">
        <select id="boardSelect" aria-label="board"></select>
        <button class="button ghost" id="newBoardBtn" data-i18n="newBoard">新增看板</button>
        <button class="button ghost" id="refreshBtn" data-i18n="refresh">重新整理</button>
        <button class="button ghost theme-toggle" id="themeToggle" type="button" aria-pressed="false">🌙 深色</button>
        <button class="button" id="langToggle" type="button" aria-label="切換語言" data-i18n-aria-label="languageToggle">EN</button>
      </div>
    </header>

    <main>
      <section class="hero-card">
        <div>
          <p id="serverLabel" class="eyebrow">KanbanWebUI</p>
          <h2 id="boardTitle">Default</h2>
          <p id="boardDescription" class="muted">使用 Hermes CLI 同一份 DB 的專用 Kanban WebUI</p>
        </div>
        <div class="health-panel">
          <span id="healthDot" class="dot"></span>
          <div>
            <strong id="healthText">loading</strong>
            <small id="dbPath"></small>
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="filters">
        <div class="filters">
          <input id="searchInput" data-i18n-placeholder="search" placeholder="搜尋" />
          <select id="assigneeFilter"><option value="" data-i18n="allAssignees">全部負責人</option></select>
          <select id="dependencyView" aria-label="dependency view">
            <option value="focus" data-i18n="dependencyViewFocus">關係線：以選取為中心</option>
            <option value="all" data-i18n="dependencyViewAll">關係線：全部</option>
            <option value="blocked" data-i18n="dependencyViewBlocked">關係線：卡住</option>
            <option value="off" data-i18n="dependencyViewOff">關係線：隱藏</option>
          </select>
          <label class="check"><input id="archivedToggle" type="checkbox" /> <span data-i18n="showArchived">顯示封存</span></label>
        </div>
        <div class="toolbar-actions">
          <button class="button ghost" id="opsToggleBtn" type="button" data-i18n="operations" aria-expanded="false">Operations</button>
          <button class="button primary" id="taskCreateBtn" type="button" data-i18n="taskCreate">新增任務</button>
          <button class="button ghost" id="workflowBtn" type="button" data-i18n="workflowCreate">建立 Workflow</button>
          <button class="button ghost" id="bulkBtn" type="button" data-i18n="bulkCreate">批次新增</button>
        </div>
      </section>

      <section id="kpiRow" class="kpi-row" aria-label="board stats"></section>
      <section id="opsPanel" class="ops-panel" aria-label="operations" hidden></section>
      <nav id="columnNav" class="column-nav" aria-label="kanban columns"></nav>
      <section id="board" class="board" aria-label="kanban board"></section>
    </main>
  </div>

  <aside id="drawer" class="drawer" aria-hidden="true"></aside>
  <div id="overlay" class="overlay" hidden></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <dialog id="taskDialog" class="modal task-modal">
    <form id="taskCreateForm" method="dialog">
      <h3 data-i18n="taskCreate">新增任務</h3>
      <p class="muted" data-i18n="taskCreateHint">需要設定標題、說明、負責 profile 與狀態時，在這裡建立新 task。</p>
      <label class="dialog-label"><span data-i18n="title">標題</span><input id="taskTitle" name="title" autocomplete="off" data-i18n-placeholder="taskTitlePlaceholder" placeholder="任務標題" required /></label>
      <label class="dialog-label"><span data-i18n="body">內容</span><textarea id="taskBody" name="body" rows="4" data-i18n-placeholder="taskBodyPlaceholder" placeholder="任務說明／指示"></textarea></label>
      <div class="task-field-grid">
        <label class="dialog-label"><span data-i18n="assignee">負責 profile</span><select id="taskAssignee" name="assignee" aria-label="agent profile"></select></label>
        <label class="dialog-label"><span data-i18n="status">狀態</span><select id="taskStatus" name="status">
          <option value="ready">ready</option>
          <option value="todo">todo</option>
          <option value="triage">triage</option>
        </select></label>
      </div>
      <div class="modal-actions">
        <button class="button ghost" type="button" data-task-cancel data-i18n="cancel">取消</button>
        <button class="button primary" value="default" data-i18n="create">新增</button>
      </div>
    </form>
  </dialog>

  <dialog id="boardDialog" class="modal">
    <form id="boardForm" method="dialog">
      <h3 data-i18n="newBoard">新增看板</h3>
      <input name="slug" placeholder="project-slug" required />
      <input name="name" data-i18n-placeholder="boardName" placeholder="看板名稱" />
      <textarea name="description" data-i18n-placeholder="description" placeholder="說明"></textarea>
      <div class="modal-actions">
        <button class="button ghost" value="cancel" data-i18n="cancel">取消</button>
        <button class="button primary" value="default" data-i18n="create">新增</button>
      </div>
    </form>
  </dialog>

  <dialog id="bulkDialog" class="modal">
    <form id="bulkForm" method="dialog">
      <h3 data-i18n="bulkCreate">批次新增</h3>
      <p class="muted" data-i18n="bulkHint">每行輸入一個任務。</p>
      <textarea name="lines" rows="10" placeholder="Task one
Task two"></textarea>
      <div class="modal-actions">
        <button class="button ghost" value="cancel" data-i18n="cancel">取消</button>
        <button class="button primary" value="default" data-i18n="create">新增</button>
      </div>
    </form>
  </dialog>

  <dialog id="workflowDialog" class="modal workflow-modal">
    <form id="workflowForm" method="dialog">
      <h3 data-i18n="workflowCreate">建立 AI Workflow</h3>
      <p class="muted" data-i18n="workflowDesignerHint">用提示詞與附件設計任務 DAG，核准後套用成真正的 Kanban task。</p>
      <label class="dialog-label"><span data-i18n="workflowPrompt">Workflow 提示詞</span><textarea id="workflowPrompt" name="prompt" rows="6" data-i18n-placeholder="workflowPromptPlaceholder" placeholder="描述想建立的 workflow" required></textarea></label>
      <div class="workflow-field-grid">
        <label class="dialog-label"><span data-i18n="workflowPlannerProfile">Planner profile</span><input id="workflowPlannerProfile" name="planner_profile" placeholder="自動選擇" /></label>
        <label class="dialog-label"><span data-i18n="workflowInstance">Instance ID</span><input name="instance_id" placeholder="選填：wf_project_001" /></label>
      </div>
      <label class="dialog-label"><span data-i18n="workflowAttachments">附件</span><input id="workflowAttachments" name="attachments" type="file" multiple /></label>
      <div class="workflow-draft-actions">
        <button class="button ghost" type="button" data-workflow-plan data-i18n="workflowPlan">規劃</button>
      </div>
      <div id="workflowDraftPreview" class="workflow-preview" aria-live="polite"></div>
      <label class="dialog-label"><span data-i18n="workflowRevise">修改提示詞</span><textarea id="workflowRevisionPrompt" name="revision_prompt" rows="3" data-i18n-placeholder="workflowRevisionPlaceholder" placeholder="輸入要修改的內容"></textarea></label>
      <div class="modal-actions">
        <button class="button ghost" type="button" data-workflow-cancel data-i18n="cancel">取消</button>
        <button class="button ghost" type="button" data-workflow-revise data-i18n="workflowRevise" disabled>修改</button>
        <button class="button primary" type="button" data-workflow-apply data-i18n="workflowApply" disabled>套用</button>
      </div>
    </form>
  </dialog>

  <dialog id="updateDialog" class="modal update-modal">
    <form method="dialog">
      <p class="eyebrow" data-i18n="updateAvailable">有新版本可用</p>
      <h3 data-i18n="updateTitle">KanbanWebUI 更新</h3>
      <p id="updateStatusMessage" class="muted update-status" data-i18n="updateChecking">正在檢查更新狀態…</p>
      <div class="update-meta">
        <span data-update-current>local</span>
        <strong>→</strong>
        <span data-update-remote>origin/main</span>
      </div>
      <ul id="updateCommitList" class="update-commit-list"></ul>
      <div class="modal-actions">
        <button class="button ghost" type="button" data-update-later data-i18n="updateLater">稍後</button>
        <button class="button primary" type="button" data-update-apply data-i18n="updateApply">更新並重新啟動</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/static/app.js?v=20260522-zh-tw"></script>
</body>
</html>
